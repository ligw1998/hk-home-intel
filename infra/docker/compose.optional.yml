services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: hk-home-intel-postgres
    environment:
      POSTGRES_DB: hk_home_intel
      POSTGRES_USER: hk_home_intel
      POSTGRES_PASSWORD: hk_home_intel
    ports:
      - "5432:5432"
    volumes:
      - hk_home_intel_pgdata:/var/lib/postgresql/data

volumes:
  hk_home_intel_pgdata:

